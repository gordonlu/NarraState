codecov:
  require_ci_to_pass: true

coverage:
  precision: 1
  round: down
  range: 60..90
  status:
    project:
      default:
        target: auto
        threshold: 2%
    patch:
      default:
        target: 70%

comment:
  layout: reach,diff,flags,files
  behavior: default
  require_changes: true

flags:
  rust:
    paths:
      - apps/
      - crates/
  web:
    paths:
      - web/src/
